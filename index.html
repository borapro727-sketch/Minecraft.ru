<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой хостинг с текстовым редактором</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Текстовый редактор с сохранением данных</h1>
        <textarea id="editor" placeholder="Введите текст здесь..."></textarea>
        <div class="buttons">
            <button onclick="saveData()">Сохранить</button>
            <button onclick="loadData()">Загрузить</button>
            <button onclick="clearData()">Очистить</button>
        </div>
        <p id="status"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
